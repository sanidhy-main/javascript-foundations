<!DOCTYPE html>
<html lang="en">
<head>
    <title>Task Manager</title>
</head>
<body>
<div class="container">

<h2>Task Manager</h2>

<input id="taskInput" type="text" placeholder="Enter a task">
<button id="addBtn">Add Task</button>

<ul id="taskList"></ul>

<script src="app.js"></script>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f6f8;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background-color: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        width: 300px;
    }

    h1 {
        text-align: center;
    }

    input {
        padding: 8px;
        width: 65%;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    button {
        padding: 8px 10px;
        border: none;
        background-color: #4CAF50;
        color: white;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background-color: #45a049;
    }

    li {
        margin-top: 10px;
        display: flex;
        justify-content: space-between;
    }

    .delete-btn {
        background-color: #e74c3c;
    }

    .delete-btn:hover {
        background-color: #c0392b;
    }
</style>

</div>
</body>
</html>
